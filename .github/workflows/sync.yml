name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # รันทุกเที่ยงคืน (UTC) = 7 โมงเช้าไทย
  workflow_dispatch: # อนุญาตให้กดรันมือได้

permissions:
  contents: write  # จำเป็นสำหรับ force push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          # ใช้ SYNC_PAT ที่มีสิทธิ์ 'workflow' แทน GITHUB_TOKEN (ถ้าไม่มีถึงจะถอยไปใช้ GITHUB_TOKEN)
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # ดึง history ทั้งหมดเพื่อ merge ได้ถูกต้อง

      - name: Setup Git Config
        run: |
          git config --global user.name "Bloodlink Auto Bot"
          git config --global user.email "bot@bloodlink.local"

      - name: Sync from Upstream
        run: |
          # 1. เชื่อมต่อ Repo ต้นฉบับ
          git remote add upstream https://github.com/RAIN128c/Bloodlink-main.git
          git fetch upstream || exit 1

          # 2. ค้นหา Master/Main สาขาที่ถูกต้อง
          if git rev-parse --verify upstream/main >/dev/null 2>&1; then UPSTREAM_BRANCH="upstream/main"; else UPSTREAM_BRANCH="upstream/master"; fi
          echo "✅ ใช้ branch: $UPSTREAM_BRANCH"

          # 3. เตรียมการ Reset Code 
          git checkout main
          git reset --hard $UPSTREAM_BRANCH

          # 4. 🔥 กู้คืนไฟล์ Workflows ของเครื่องเราเองกลับมา เพื่อไม่ให้พยายามเขียนทับ Workflow ฝั่ง banyangyuan121 
          # วิธีนี้หลีกเลี่ยงข้อความ [remote rejected] แบบเด็ดขาด
          git checkout HEAD@{1} -- .github/workflows/ || echo "No workflows to restore"
          git commit --amend --no-edit || echo "Nothing to amend"

          # 5. ใส่ SYNC_PAT และสั่ง Push
          if [ -n "${{ secrets.SYNC_PAT }}" ]; then
            git remote set-url origin https://${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git
          fi
          git push origin main --force

          echo "✅ Sync สำเร็จ (ข้ามไฟล์ Workflows)"
