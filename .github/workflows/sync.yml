name: Push to Downstream

# วิธีตั้งค่า:
# 1. สร้าง PAT ของบัญชีปลายทาง (Fine-grained token, สิทธิ์ Contents: Read & Write เฉพาะ repo ปลายทาง)
# 2. เพิ่ม Secrets ใน repo นี้ (Settings > Secrets > Actions):
#    - DOWNSTREAM_PAT  = PAT ที่สร้างจากข้อ 1
#    - DOWNSTREAM_REPO = owner/repo-name ของปลายทาง (เช่น username/my-project)
# 3. (ไม่บังคับ) เพิ่ม VERCEL_DEPLOY_HOOK ถ้าปลายทางใช้ Vercel

on:
  push:
    branches: [main]
  workflow_dispatch: # อนุญาตให้กดรันมือได้

permissions:
  contents: read

jobs:
  push-downstream:
    runs-on: ubuntu-latest
    # ข้าม job ถ้ายังไม่ได้ตั้ง secrets
    if: vars.DOWNSTREAM_REPO != '' 

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Sync to downstream (squashed, no history leak)
        env:
          DOWNSTREAM_PAT: ${{ secrets.DOWNSTREAM_PAT }}
          DOWNSTREAM_REPO: ${{ vars.DOWNSTREAM_REPO }}
        run: |
          set -e

          # ดึงชื่อ owner จาก DOWNSTREAM_REPO (เช่น "username/repo" → "username")
          OWNER=$(echo "$DOWNSTREAM_REPO" | cut -d'/' -f1)

          # ตั้งค่า Git ใช้ชื่อ+อีเมลของเจ้าของ repo ปลายทาง (Vercel ต้องการ)
          git config --global user.name "$OWNER"
          git config --global user.email "${OWNER}@users.noreply.github.com"

          # Clone repo ปลายทาง
          git clone --depth=1 "https://x:${DOWNSTREAM_PAT}@github.com/${DOWNSTREAM_REPO}.git" _downstream
          cd _downstream

          # เก็บ .git ของปลายทางไว้
          mv .git ../_downstream_git

          # ลบไฟล์เก่าทั้งหมด
          rm -rf ./* ./.[^.]*  2>/dev/null || true

          # คัดลอกไฟล์ทั้งหมดจากต้นทาง (ไม่รวม .git)
          cd ..
          rsync -a --exclude='.git' --exclude='_downstream' --exclude='_downstream_git' ./ _downstream/

          # คืน .git ของปลายทาง
          mv _downstream_git _downstream/.git
          cd _downstream

          # ลบ workflow ของต้นทางออก เพื่อไม่ให้ปลายทางมี workflow นี้
          rm -rf .github/workflows/sync.yml 2>/dev/null || true

          # Commit และ Push (ถ้ามีการเปลี่ยนแปลง)
          git add -A
          if git diff --staged --quiet; then
            echo "✅ ไม่มีการเปลี่ยนแปลง (No changes to sync)"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "update: latest changes (${TIMESTAMP})"
            git push
            echo "✅ Sync สำเร็จ — ปลายทางได้รับอัปเดตแล้ว"
          fi

      - name: Trigger Vercel Deploy (optional)
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK"
            echo "✅ Vercel Deploy triggered"
          fi
