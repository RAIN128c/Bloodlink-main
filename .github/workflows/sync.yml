name: Auto Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # รันทุกเที่ยงคืน (UTC) = 7 โมงเช้าไทย
  workflow_dispatch: # อนุญาตให้กดรันมือได้

permissions:
  contents: write  # จำเป็นสำหรับ force push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          # ใช้ SYNC_PAT ที่มีสิทธิ์ 'workflow' แทน GITHUB_TOKEN (ถ้าไม่มีถึงจะถอยไปใช้ GITHUB_TOKEN)
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # ดึง history ทั้งหมดเพื่อ merge ได้ถูกต้อง

      - name: Setup Git Config
        run: |
          # 🚨 หลอก Vercel โดยใช้บัญชีของเจ้าของ Fork โดยตรง (เพื่อยืนยันว่าเป็นเจ้าของ Deploy เอง)
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Sync from Upstream
        run: |
          # 1. เชื่อมต่อ Repo ต้นฉบับ
          git remote add upstream https://github.com/RAIN128c/Bloodlink-main.git
          git fetch upstream || exit 1

          # 2. ค้นหา Master/Main สาขาที่ถูกต้อง
          if git rev-parse --verify upstream/main >/dev/null 2>&1; then UPSTREAM_BRANCH="upstream/main"; else UPSTREAM_BRANCH="upstream/master"; fi
          echo "✅ ใช้ branch: $UPSTREAM_BRANCH"

          # 3. เตรียมการดึงไฟล์ทั้งหมด (แบบไม่สืบทอดประวัติ Commit ของ RAIN128c)
          git checkout main
          
          # เปลี่ยนไปยัง Branch ชั่วคราว โดยดึงไฟล์ล่าสุดของต้นฉบับมาทั้งหมด (รวมไฟล์ลบ/เพิ่ม)
          git checkout -B sync-temp $UPSTREAM_BRANCH

          # 4. 🔥 กู้คืนไฟล์ Workflows ของเครื่องเราเอง ไม่ให้ถูกทับ
          git checkout main -- .github/workflows/ || echo "No workflows to restore"

          # 5. ถอย HEAD กลับมาที่ main เพื่อเตรียม Commit แบบรวบยอด (Squash)
          git reset --soft main

          # 6. เช็คว่ามีอะไรเปลี่ยนแปลงไหม ถ้ามีให้สร้าง Commit ใหม่ในชื่อเจ้าของ Fork
          if git diff --staged --quiet; then
            echo "✅ ต้นฉบับไม่มีอะไรอัปเดต (No changes)"
          else
            git commit -m "sync: auto update from upstream (bypass vercel format)"
            git checkout main
            git merge sync-temp --ff-only

            # ใส่ SYNC_PAT และสั่ง Push กลับเข้า Fork
            if [ -n "${{ secrets.SYNC_PAT }}" ]; then
              git remote set-url origin https://${{ github.actor }}:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git
            fi
            git push origin main
            echo "✅ Sync สำเร็จ (ข้ามข้อจำกัด Vercel 100%)"
          fi

      - name: Trigger Vercel Deploy Hook (Bypass Bot Check)
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            echo "🚀 กำลังสั่ง Vercel ให้ Deploy ผ่านประตูลับ (Deploy Hook)..."
            curl -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "⏭️ ข้ามการ Deploy Vercel เนื่องจากไม่ได้ตั้ง VERCEL_DEPLOY_HOOK secret"
          fi
