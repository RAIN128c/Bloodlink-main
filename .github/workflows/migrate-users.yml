name: Migrate Legacy Users
description: "Workflow to manually or automatically run the legacy user migration script."

on:
  workflow_dispatch: # อนุญาตให้กดรันแบบแมนนวลได้จากหน้า GitHub Actions

jobs:
  migrate-users:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bloodlink-next

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ใช้ Node.js version 20 (LTS)
          cache: 'npm'
          cache-dependency-path: ./bloodlink-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Legacy Users Migration Script
        env:
          # ต้องไปตั้งค่า Secrets 2 ตัวนี้ใน GitHub Repo Settings > Secrets and variables > Actions
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Starting Migration Script..."
          npx tsx scripts/migrate-legacy-users.ts
