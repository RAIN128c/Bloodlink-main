<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --primary-color: #6366F1;
        --primary-dark: #4F46E5;
        --bg-light: #F3F4F6;
        --bg-white: #FFFFFF;
        --text-dark: #1F2937;
        --text-gray: #6B7280;
        --text-light: #9CA3AF;
        --border-color: #E5E7EB;
        --sidebar-bg: #F8F9FA;
        --badge-bg: #EF4444;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
        --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: var(--bg-light);
        color: var(--text-dark);
        overflow-x: hidden;
    }

    .dashboard-container {
        display: flex;
        min-height: 100vh;
        position: relative;
    }

    /* ==================== Sidebar ==================== */
    .sidebar {
        width: 200px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
    }

    .sidebar-content {
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
        height: 100%;
    }

    .logo-section {
        text-align: center;
        margin-bottom: 24px;
    }

    .logo {
        width: 120px;
        height: auto;
    }

    /* Clock Widget */
    .clock-widget {
        background: white;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        margin-bottom: 20px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
    }

    .time {
        font-size: 32px;
        font-weight: 700;
        color: var(--text-dark);
        font-family: 'Courier New', monospace;
        letter-spacing: 2px;
    }

    .date-thai {
        font-size: 11px;
        color: var(--text-gray);
        margin-top: 4px;
    }

    .date-eng {
        font-size: 10px;
        color: var(--text-light);
        margin-top: 2px;
    }

    /* Add Button */
    .add-btn {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin: 0 auto 24px;
        box-shadow: var(--shadow-md);
        transition: all 0.3s ease;
    }

    .add-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
    }

    .add-btn:active {
        transform: translateY(0);
    }

    /* Navigation Menu */
    .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: white;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text-dark);
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--border-color);
        transition: all 0.2s ease;
        position: relative;
    }

    .nav-item:hover {
        background: #F9FAFB;
        border-color: var(--primary-color);
        color: var(--primary-color);
    }

    .nav-item svg {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
    }

    .nav-item span:not(.badge) {
        flex: 1;
    }

    .nav-item .badge {
        background: var(--badge-bg);
        color: white;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 10px;
        min-width: 18px;
        text-align: center;
    }

    /* Logout Button */
    .logout-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        background: white;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        color: var(--text-dark);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: auto;
    }

    .logout-btn:hover {
        background: #FEE2E2;
        border-color: #EF4444;
        color: #DC2626;
    }

    .logout-btn svg {
        width: 20px;
        height: 20px;
    }

    /* ==================== Main Content ==================== */
    .main-content {
        margin-left: 200px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* Top Bar */
    .top-bar {
        background: white;
        border-bottom: 1px solid var(--border-color);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: var(--shadow-sm);
    }

    .home-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: white;
        border: 1px solid var(--border-color);
        border-radius: 24px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-gray);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .home-btn.active {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
    }

    .home-btn svg {
        width: 18px;
        height: 18px;
    }

    .home-btn:not(.active):hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
    }

    .search-container {
        flex: 1;
        max-width: 400px;
        position: relative;
    }

    .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
    }

    .search-input {
        width: 100%;
        padding: 10px 12px 10px 40px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        color: var(--text-dark);
        background: var(--bg-light);
        transition: all 0.2s ease;
    }

    .search-input:focus {
        outline: none;
        border-color: var(--primary-color);
        background: white;
    }

    .search-input::placeholder {
        color: var(--text-light);
    }

    .top-bar-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-left: auto;
    }

    /* Toggle Switch */
    .toggle-switch {
        position: relative;
        width: 48px;
        height: 26px;
        display: inline-block;
    }

    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #CBD5E1;
        border-radius: 34px;
        transition: 0.3s;
    }

    .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.3s;
    }

    .toggle-switch input:checked+.toggle-slider {
        background-color: var(--primary-color);
    }

    .toggle-switch input:checked+.toggle-slider:before {
        transform: translateX(22px);
    }

    /* Profile Button */
    .profile-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
        background: #EEF2FF;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .profile-btn:hover {
        border-color: var(--primary-color);
        transform: scale(1.05);
    }

    /* ==================== Content Area ==================== */
    .content-area {
        flex: 1;
        padding: 32px;
        background: var(--bg-light);
    }

    .welcome-message {
        background: white;
        border-radius: 16px;
        padding: 48px;
        text-align: center;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
        max-width: 600px;
        margin: 64px auto;
    }

    .welcome-message h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .welcome-message p {
        font-size: 16px;
        color: var(--text-gray);
    }

    /* ==================== Help Button ==================== */
    .help-btn {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: var(--shadow-lg);
        transition: all 0.3s ease;
        z-index: 1000;
    }

    .help-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
    }

    .help-btn:active {
        transform: scale(0.95);
    }

    /* ==================== Responsive Design ==================== */
    @media (max-width: 768px) {
        .sidebar {
            width: 80px;
        }

        .main-content {
            margin-left: 80px;
        }

        .nav-item span:not(.badge),
        .logout-btn span {
            display: none;
        }

        .logo {
            width: 48px;
        }

        .clock-widget {
            padding: 8px;
        }

        .time {
            font-size: 20px;
        }

        .date-thai,
        .date-eng {
            font-size: 8px;
        }

        .search-container {
            display: none;
        }

        .home-btn span {
            display: none;
        }
    }

    /* ==================== Animations ==================== */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .content-area>* {
        animation: fadeIn 0.5s ease;
    }
</style>
